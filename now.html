<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MedEdTate — Calm Down Tool</title>
  <meta name="description" content="Guided breathing, grounding, and body scan exercises for acute anxiety and panic attacks in the emergency department.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="now.css">
</head>
<body>

  <!-- Top Nav -->
  <nav class="now-nav" id="now-nav">
    <a href="/index.html" class="now-nav-home" aria-label="Back to MedEdTate home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>MedEdTate</span>
    </a>
    <div class="now-nav-right">
      <!-- Sound toggle hidden until voice tracks are added
      <button class="now-nav-sound active" id="btn-sound" aria-label="Toggle voice guide">
        <svg id="icon-sound-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <svg id="icon-sound-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      -->
      <button class="now-nav-back" id="btn-back" aria-label="Go back" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Back</span>
      </button>
    </div>
  </nav>

  <!-- Phase 0: Entry -->
  <section id="phase-entry" class="phase active">
    <div class="phase-center">
      <h1 class="entry-title">You're safe.<br>Let's slow things down.</h1>
      <p class="entry-sub">This will take about 4 minutes.</p>
      <button class="btn-ready" id="btn-ready">I'm ready</button>
    </div>
  </section>

  <!-- Phase 1: Mode Select -->
  <section id="phase-select" class="phase">
    <div class="phase-center">
      <div class="mode-cards">
        <button class="mode-card" data-mode="calm">
          <span class="mode-icon" aria-hidden="true">&#x1F32C;&#xFE0F;</span>
          <span class="mode-label">Calm Breath</span>
          <span class="mode-sub">Deep slow breathing</span>
        </button>
        <button class="mode-card" data-mode="breathe">
          <span class="mode-icon" aria-hidden="true">&#x1FAC1;</span>
          <span class="mode-label">Box Breathe</span>
          <span class="mode-sub">Slow your body down</span>
        </button>
        <button class="mode-card" data-mode="ground">
          <span class="mode-icon" aria-hidden="true">&#x1F33F;</span>
          <span class="mode-label">Ground</span>
          <span class="mode-sub">Connect to right now</span>
        </button>
        <button class="mode-card" data-mode="scan">
          <span class="mode-icon" aria-hidden="true">&#x1F9D8;</span>
          <span class="mode-label">Body Scan</span>
          <span class="mode-sub">Release physical tension</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Phase 2A-calm: Calm Breath (4-7-8) -->
  <section id="phase-calm" class="phase">
    <div class="phase-center">
      <div class="breath-progress-bar"><div class="breath-progress-fill" id="calm-progress"></div></div>
      <div class="breath-circle" id="calm-circle">
        <span class="breath-label" id="calm-label">Inhale</span>
        <span class="breath-count" id="calm-count">4</span>
      </div>
      <p class="breath-round" id="calm-round">Round 1 of 4</p>
    </div>
  </section>

  <!-- Phase 2A-box: Box Breathing -->
  <section id="phase-breathe" class="phase">
    <div class="phase-center">
      <div class="breath-progress-bar"><div class="breath-progress-fill" id="breath-progress"></div></div>
      <div class="breath-circle" id="breath-circle">
        <span class="breath-label" id="breath-label">Inhale</span>
        <span class="breath-count" id="breath-count">4</span>
      </div>
      <p class="breath-round" id="breath-round">Round 1 of 5</p>
    </div>
  </section>

  <!-- Phase 2B: Grounding -->
  <section id="phase-ground" class="phase">
    <div class="phase-center">
      <p class="ground-prompt" id="ground-prompt"></p>
      <div class="ground-dots" id="ground-dots"></div>
    </div>
  </section>

  <!-- Phase 2C: Body Scan -->
  <section id="phase-scan" class="phase">
    <div class="phase-center">
      <div class="scan-container">
        <svg class="scan-body" viewBox="0 0 200 500" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Head -->
          <ellipse class="body-part" data-region="face" cx="100" cy="45" rx="28" ry="32"/>
          <!-- Neck -->
          <rect class="body-part" data-region="face" x="90" y="75" width="20" height="18" rx="4"/>
          <!-- Shoulders -->
          <path class="body-part" data-region="shoulders" d="M60 95 Q100 85 140 95 L140 110 Q100 100 60 110 Z"/>
          <!-- Torso upper (chest) -->
          <path class="body-part" data-region="chest" d="M60 110 L60 200 Q100 210 140 200 L140 110 Q100 100 60 110 Z"/>
          <!-- Torso lower (abdomen) -->
          <path class="body-part" data-region="abdomen" d="M60 200 L65 280 Q100 290 135 280 L140 200 Q100 210 60 200 Z"/>
          <!-- Left arm -->
          <path class="body-part" data-region="shoulders" d="M60 95 L35 100 L20 200 L30 205 L45 115 L60 110 Z" />
          <!-- Right arm -->
          <path class="body-part" data-region="shoulders" d="M140 95 L165 100 L180 200 L170 205 L155 115 L140 110 Z" />
          <!-- Left leg -->
          <path class="body-part" data-region="legs" d="M65 280 L60 400 L55 430 L80 430 L75 400 L100 285 Z"/>
          <!-- Right leg -->
          <path class="body-part" data-region="legs" d="M135 280 L140 400 L145 430 L120 430 L125 400 L100 285 Z"/>
          <!-- Left foot -->
          <path class="body-part" data-region="feet" d="M55 430 L45 465 L85 465 L80 430 Z"/>
          <!-- Right foot -->
          <path class="body-part" data-region="feet" d="M145 430 L155 465 L115 465 L120 430 Z"/>
        </svg>
        <p class="scan-instruction" id="scan-instruction"></p>
      </div>
    </div>
  </section>

  <!-- Phase 3: Closing Check-in -->
  <section id="phase-checkin" class="phase">
    <div class="phase-center">
      <h2 class="checkin-title">How are you feeling now?</h2>
      <div class="checkin-emojis" id="checkin-emojis">
        <button class="checkin-emoji" data-level="1" aria-label="Very anxious">&#x1F630;</button>
        <button class="checkin-emoji" data-level="2" aria-label="Anxious">&#x1F61F;</button>
        <button class="checkin-emoji" data-level="3" aria-label="Okay">&#x1F610;</button>
        <button class="checkin-emoji" data-level="4" aria-label="Better">&#x1F60C;</button>
        <button class="checkin-emoji" data-level="5" aria-label="Calm">&#x1F60A;</button>
      </div>
      <p class="checkin-response" id="checkin-response"></p>
      <button class="btn-another" id="btn-another" style="display:none;">Try another</button>
      <p class="checkin-nurse" id="checkin-nurse" style="display:none;">Tell your nurse how you're feeling.</p>
    </div>
  </section>

  <script src="now.js"></script>

  <!-- Vercel Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
