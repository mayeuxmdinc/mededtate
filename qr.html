<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedEdTate — QR Code Card</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 4in;
      height: 6in;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      text-align: center;
      gap: 24px;
    }

    .card-label {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2e24;
      line-height: 1.3;
    }

    #qrcode {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qrcode canvas,
    #qrcode img {
      width: 220px !important;
      height: 220px !important;
    }

    .card-url {
      font-size: 0.95rem;
      color: #5a7268;
      font-weight: 600;
    }

    .card-brand {
      font-size: 0.85rem;
      color: #8fa89d;
      margin-top: 8px;
    }

    .btn-print {
      margin-top: 24px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      background: #4a8b6e;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-print:hover {
      background: #3a7259;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .btn-print {
        display: none !important;
      }

      .card {
        box-shadow: none;
        border-radius: 0;
        width: 4in;
        height: 6in;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="card-label">Feeling anxious?<br>Scan here.</p>
    <div id="qrcode"></div>
    <p class="card-url">mededtate.com/now</p>
    <p class="card-brand">MedEdTate</p>
  </div>

  <button class="btn-print" onclick="window.print()">Print Card</button>

  <script src="qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://mededtate.com/now',
      width: 220,
      height: 220,
      colorDark: '#1a2e24',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>

  <!-- Vercel Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
