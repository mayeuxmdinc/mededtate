<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Knoxville';
      src: url('../fonts/Knoxville-Regular.otf') format('opentype'),
           url('../fonts/Knoxville-Regular.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }

    table {
      width: 1200px;
      height: 630px;
      border-collapse: collapse;
      background: linear-gradient(135deg, #f7faf8 0%, #eef5f1 50%, #e0f0e8 100%);
    }
    .main-row { height: 574px; }
    .lotus-cell {
      width: 400px;
      text-align: center;
      vertical-align: middle;
      position: relative;
    }
    .content-cell {
      vertical-align: middle;
      padding-right: 72px;
    }
    .url-cell {
      width: 200px;
      vertical-align: bottom;
      padding-right: 60px;
      padding-bottom: 44px;
      text-align: right;
    }

    .brand {
      font-family: 'Knoxville', serif;
      font-size: 72px;
      font-weight: normal;
      letter-spacing: 0.04em;
      color: #1a2e24;
      line-height: 1;
      margin-bottom: 10px;
    }
    .brand span { color: #4a8b6e; }
    .tagline {
      font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      font-size: 24px;
      color: #5a7268;
      margin-bottom: 22px;
    }
    .divider {
      width: 56px;
      height: 3px;
      background: linear-gradient(90deg, #4a8b6e, #6ba593);
      border-radius: 2px;
      margin-bottom: 22px;
    }
    .description {
      font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      font-size: 20px;
      color: #2d3e36;
      line-height: 1.55;
      max-width: 540px;
      margin-bottom: 28px;
    }
    .pills { display: flex; gap: 12px; font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; }
    .pill {
      padding: 8px 22px;
      border-radius: 100px;
      background: #fff;
      border: 1.5px solid #d4e5dc;
      color: #3a7259;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .url {
      font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      font-size: 17px;
      color: #3a7259;
      letter-spacing: 0.04em;
      font-weight: 700;
    }
  </style>
</head>
<body>
<table>
  <tr class="main-row" style="height:630px;">
    <td class="lotus-cell">
      <svg style="position:absolute;width:340px;height:340px;top:50%;left:50%;transform:translate(-50%,-50%);" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="80" fill="none" stroke="#4a8b6e" stroke-width="0.6" opacity="0.25"/>
        <circle cx="100" cy="100" r="60" fill="none" stroke="#4a8b6e" stroke-width="0.6" opacity="0.18"/>
        <circle cx="100" cy="100" r="40" fill="none" stroke="#4a8b6e" stroke-width="0.6" opacity="0.12"/>
      </svg>
      <svg style="position:relative;z-index:2;width:120px;height:120px;" viewBox="0 0 140 140" fill="none">
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(0 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(45 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(90 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(135 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(180 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(225 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(270 70 70)"/>
        <ellipse cx="70" cy="36" rx="9" ry="26" fill="#6ba593" opacity="0.7" transform="rotate(315 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(0 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(45 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(90 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(135 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(180 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(225 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(270 70 70)"/>
        <ellipse cx="70" cy="44" rx="6.5" ry="19" fill="#4a8b6e" opacity="0.9" transform="rotate(315 70 70)"/>
        <circle cx="70" cy="70" r="13" fill="#3a7259"/>
        <circle cx="70" cy="70" r="7" fill="#e0f0e8"/>
      </svg>
    </td>
    <td class="content-cell">
      <div class="brand">MED<span>ed</span>TATE</div>
      <div class="tagline">calm for the ER</div>
      <div class="divider"></div>
      <div class="description">One tap. Guided breathing for anxiety and panic — no login, no app, no setup. Relief right when patients need it most.</div>
      <div class="pills">
        <div class="pill">breathe</div>
        <div class="pill">ground</div>
        <div class="pill">reset</div>
      </div>
    </td>
    <td class="url-cell">
      <span class="url">mededtate.com</span>
    </td>
  </tr>
</table>
</body>
</html>
